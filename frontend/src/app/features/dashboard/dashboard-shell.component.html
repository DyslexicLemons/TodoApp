<header class="shell-header">
  <div class="header-spacer" aria-hidden="true"></div>
  <nav class="tab-nav">
    @for (tab of tabs; track tab.path) {
      <a class="tab-link" [routerLink]="tab.path" routerLinkActive="tab-link--active">{{ tab.label }}</a>
    }
  </nav>
  <div class="header-actions">
    <button class="add-task-btn" type="button" (click)="openAddTask()">+ Add Task</button>
    <div class="settings-menu">
      <button
        class="settings-btn"
        type="button"
        aria-label="Settings"
        [attr.aria-expanded]="isSettingsOpen()"
        (click)="toggleSettings()"
      >
        ⚙️
      </button>
      @if (isSettingsOpen()) {
        <div class="settings-panel">
          <p class="settings-panel__title">Settings</p>
          <label class="dark-toggle">
            <span>Dark mode</span>
            <button
              type="button"
              class="switch"
              [class.switch--on]="isDarkMode()"
              role="switch"
              [attr.aria-checked]="isDarkMode()"
              (click)="toggleDarkMode()"
            >
              <span class="switch__thumb"></span>
            </button>
          </label>
        </div>
      }
    </div>
  </div>
</header>

<main class="shell-main">
  <router-outlet></router-outlet>
</main>

@if (isAddTaskOpen()) {
  <app-add-task-modal (close)="closeAddTask()" (created)="onTaskCreated()"></app-add-task-modal>
}
