<div class="modal-backdrop" (click)="close.emit()">
  <form class="modal" [formGroup]="form" (click)="$event.stopPropagation()" (ngSubmit)="submit()">
    <h2>Add Task</h2>

    <label>
      Title
      <input type="text" formControlName="title" autocomplete="off" />
    </label>

    <label>
      Description
      <textarea formControlName="description" rows="2"></textarea>
    </label>

    <div class="grid">
      <label>
        Est. hours
        <input type="number" formControlName="estimatedHours" min="0" step="1" />
      </label>

      <label>
        Est. minutes
        <input type="number" formControlName="estimatedMins" min="0" max="59" step="5" />
      </label>

      <label>
        Category
        <select formControlName="category">
          @for (c of categories; track c) {
            <option [value]="c">{{ c }}</option>
          }
        </select>
      </label>

      <label>
        Due date
        <input type="date" formControlName="dueDate" />
      </label>

      <label>
        Frequency
        <select formControlName="frequency">
          @for (f of frequencies; track f) {
            <option [value]="f">{{ f }}</option>
          }
        </select>
      </label>

      @if (form.value.frequency === 'Weekly') {
        <label>
          Times per week
          <input type="number" formControlName="targetCount" min="1" step="1" />
        </label>
      }
    </div>

    <label class="checkbox-row">
      <input type="checkbox" formControlName="isMustDo" />
      Must Do
    </label>

    <div class="modal-actions">
      <button type="button" class="btn-secondary" (click)="close.emit()">Cancel</button>
      <button type="submit" class="btn-primary" [disabled]="form.invalid || submitting()">
        {{ submitting() ? 'Adding...' : 'Add Task' }}
      </button>
    </div>
  </form>
</div>
