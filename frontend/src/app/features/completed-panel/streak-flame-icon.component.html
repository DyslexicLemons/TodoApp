<span class="flame-icon flame-icon--{{ tier() }}" [attr.title]="'Streak: ' + streakValue()">
  @switch (tier()) {
    @case ('volcano') {
      <svg viewBox="0 0 24 24" width="28" height="28">
        <path d="M4 20 L9 8 L12 13 L15 6 L20 20 Z" fill="#4a4a52" />
        <path
          d="M12 4c1.2 1.6.4 2.6-.2 3.4-.7.9-1.1 1.7-.1 2.9 1-1 1.7-.6 1.9.2.2-1 .9-1.6 1.7-1 .5-1.6-.5-2.3-1.1-2.9-.7-.7-1.4-1.4-2.2-2.6Z"
          fill="#ff7a1a"
        />
        <path d="M11 9c.6.8.2 1.4-.2 1.9 1 .2 1.4-.3 1.6-.8.4.6.2 1.1-.1 1.5.7-.1 1-.6 1-1.2-.5-.5-1.3-.7-2.3-1.4Z" fill="#ffd23f" />
      </svg>
    }
    @case ('big') {
      <svg viewBox="0 0 24 24" width="24" height="24">
        <path
          d="M12 2c2 3-1 4-1 7a3 3 0 1 0 6 0c0-2-1-3-1-3 2 1 4 4 4 7a8 8 0 1 1-16 0c0-5 4-7 5-9 .5 1 1 1.5 1 2.5-1 1-2 2-2 3.5a3 3 0 0 0 3 3c0-3-1-4 1-11Z"
          fill="#ff5a1f"
        />
      </svg>
    }
    @default {
      <svg viewBox="0 0 24 24" width="18" height="18">
        <path
          d="M12 3c1.5 2.2-.5 3.2-.5 5.2a2.5 2.5 0 0 0 5 0c0-1.3-.5-2-.5-2 1.3.9 2.5 2.7 2.5 4.8a6.5 6.5 0 1 1-13 0c0-3.5 2.7-5 3.5-6.3.4.7.6 1 .6 1.7-.8.8-1.6 1.6-1.6 2.8a2.5 2.5 0 0 0 2.5 2.5c0-2.2-.8-3-.5-7.7Z"
          fill="#ff8a3d"
        />
      </svg>
    }
  }
</span>
